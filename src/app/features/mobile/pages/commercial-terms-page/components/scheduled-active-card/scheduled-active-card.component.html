<div class="card mt-08">
  <div class="card-body d-flex flex-column align-items-center gap-2">
    <div
      class="card-prepayment w-100 d-flex align-items-center justify-content-start gap-2"
    >
      <div class="prepayment-icon d-flex align-items-center">
        <span class="material-symbols-outlined text-secondary">schedule</span>
      </div>

      <div
        class="prepayment-content d-flex justify-content-between align-items-center w-100"
      >
        <div
          class="content-info d-flex flex-column justify-content-end gap-2 text-gray-900"
        >
          <div class="container">
            <div class="row">
              <div class="col-7 pr-2">
                <span class="info-label"
                  ><b>Antecipação Automática Ativa</b></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col-7 pr-2">
                <span class="info-label"
                  ><b>Tipo</b>:
                  <small>{{ scheduledFinalized.frequencyType }}</small></span
                >
              </div>
            </div>
            <div
              class="row"
              *ngIf="scheduledFinalized.frequencyType !== 'Diário'"
            >
              <div class="col-7 pr-2">
                <span class="info-label"
                  ><b>Período</b>: <small>{{ period }}</small></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col-7 pr-2">
                <span class="info-label"
                  ><b>Transação</b>: <small>Petlove</small></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col-10 pb-3">
                <span class="info-label"
                  ><b>Adquirente(s)</b>:
                  <ul class="ul-accreditations">
                    <li
                      class="li-accreditations"
                      *ngFor="let check of scheduledFinalized.accreditations"
                    >
                      {{ getAccreditationName(check) }}
                    </li>
                  </ul>
                </span>
              </div>
            </div>
            <div class="row">
              <div class="col-7 pr-2">
                <span class="info-label"
                  ><b>Taxa ao dia</b>:
                  <small
                    >{{
                      scheduledFinalized.rate | number: "1.3-5" | slice: 0 : 5
                    }}
                    %</small
                  ></span
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="row">
        <div class="col-6">
          <button
            class="btn btn-outline-primary btn-scheduled-cancel"
            [disabled]="!hasSelectedEstablishment"
            (click)="onOpenScheduledCancelDialog()"
          >
            <span class="lh-1">Cancelar</span>
          </button>
        </div>
        <div class="col-6">
          <button
            class="btn btn-primary btn-scheduled-edit"
            [disabled]="!hasSelectedEstablishment"
            (click)="onEdit()"
          >
            <span class="lh-1 text-white">Editar</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

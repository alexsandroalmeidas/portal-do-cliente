<div class="card card-punctual">
  <div class="card-body d-flex flex-column align-items-center gap-2 card-body-punctual">

    <div class="card-prepayment w-100 d-flex align-items-center justify-content-start gap-2">
      <div class="prepayment-icon prepayment-icon-punctual d-flex align-items-center">
        <span class="material-symbols-outlined text-primary">step</span>
      </div>

      <div class="prepayment-content d-flex justify-content-between align-items-center w-100">
        <div class="content-info d-flex flex-column justify-content-end gap-2 text-gray-900">

          <div class="container mb-04">
            <div class="row">
              <div class="col-10 pb-3 pl-0">
                <span class="info-label text-primary"><b>Antecipação</b></span> <br />
                <span class="info-label text-primary fs-2"><b>Pontual</b></span> <br />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-prepayment w-100 d-flex align-items-center justify-content-start gap-2">
      <div class="container">
        <div class="row">
          <div class="col-5 fs-28 p-0 d-flex align-items-center justify-content-start fw-bolder">
            {{punctualRate || 0 | number:'1.3-5' | slice:0:5}} %
          </div>
        </div>
        <div class="row">
          <span class="info-label fs-14 pl-4">taxa ao dia</span>
        </div>
      </div>
    </div>

    <div class="card-prepayment w-100">
      <div class="list-prepayments">
        <ul class="list-group list-group-flush">
          <li class="list-group-item p-0">
            <div style=" display: inline-flex;vertical-align: middle;">
              <app-check-marked [checkboxId]="'checkbox1'" [backgroundColor]="'gray'" />

              <div class="info-label fs-bullet pl-05 v-align-middle text-gray">
                <p class="mb-0">Controle quanto e quando</p>
                <p>receber</p>
              </div>
            </div>
          </li>
          <li class="list-group-item p-0">
            <div style=" display: inline-flex;vertical-align: middle;">
              <app-check-marked [checkboxId]="'checkbox2'" [backgroundColor]="'gray'" />

              <div class="info-label fs-bullet pl-05 v-align-middle text-gray">
                <p class="mb-0">Tenha dinheiro disponível rápido</p>
                <p>para emergências</p>
              </div>
            </div>
          </li>
          <li class="list-group-item p-0">
            <div style=" display: inline-flex;vertical-align: middle;">
              <app-check-marked [checkboxId]="'checkbox3'" [backgroundColor]="'gray'" />

              <div class="info-label fs-bullet pl-05 v-align-middle text-gray">
                <p class="mb-0">Menos burocracias, receba</p>
                <p>no mesmo dia</p>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>

    <div class="container container-btn-position">
      <div class="row">
        <div class="d-flex align-items-end">
          <div class="col-12" align="center">
            <button type="button" class="btn btn-primary btn-sm btn-punctual text-white" (click)="onRequestClick()">
              <span class="material-symbols-outlined text-white icon-request">step</span>
              Solicitar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- <app-card-prepayments-unavailable *ngIf="!prepaymentsAvailable"></app-card-prepayments-unavailable> -->

  </div>
</div>

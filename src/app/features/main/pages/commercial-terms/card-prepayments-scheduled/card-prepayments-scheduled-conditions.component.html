<div class="card card-scheduled pt-2">
  <div
    class="card-body d-flex flex-column align-items-center gap-2 card-body-scheduled"
  >
    <div class="container">
      <div class="row align-items-center">
        <div class="col pb-3 pl-0">
          <div
            class="prepayment-icon prepayment-icon-scheduled-finalized d-flex align-items-start"
          >
            <div style="display: inline-flex; vertical-align: middle">
              <span class="material-symbols-outlined text-primary"
                >schedule</span
              >
              <span
                class="info-label text-primary fs-1 fw-bolder"
                style="margin-top: 0.3rem"
                >Antecipação Automática</span
              >
            </div>
          </div>
        </div>
        <div class="col pb-3 pl-0">
          <div class="container">
            <div class="row">
              <div class="col">
                <span class="info-label fs-14"
                  ><b>Tipo</b>:
                  <small>{{ scheduledFinalized.frequencyType }}</small></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col">
                <span class="info-label fs-14"
                  ><b>Período</b>: <small>{{ period }}</small></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col">
                <span class="info-label fs-14"
                  ><b>Transação</b>: <small>Petlove</small></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col">
                <span class="info-label fs-14"
                  ><b>Taxa ao dia</b>:
                  <small
                    >{{
                      scheduledFinalized.rate | number: "1.3-5" | slice: 0 : 5
                    }}
                    %</small
                  ></span
                >
              </div>
            </div>
            <div class="row">
              <div class="col">
                <span class="info-label fs-14"
                  ><b>Adquirente(s)</b>:
                  <ul class="ul-accreditations">
                    <li
                      class="li-accreditations"
                      *ngFor="let check of scheduledFinalized.accreditations"
                    >
                      {{ getAccreditationName(check) }}
                    </li>
                  </ul>
                </span>
              </div>
            </div>
          </div>
        </div>
        <div class="col pb-3 pl-0">
          <button
            type="button"
            class="btn btn-outline-primary btn-sm btn-scheduled mr-2"
            (click)="onCancelClick()"
          >
            Cancelar
          </button>
          <button
            type="button"
            class="btn btn-primary btn-sm btn-scheduled"
            (click)="onEditClick()"
          >
            Editar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

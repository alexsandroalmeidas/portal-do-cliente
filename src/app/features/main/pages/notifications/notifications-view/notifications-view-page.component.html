<div class="col-12">
  <div class="card mt-3">

      <p class="card-title mb-0"><small class="text-muted">{{notificationView.createdDate | date:'dd/MM/yyyy'}}</small>
      </p>
      <h4 class="card-title">{{notificationView.title }}</h4>
      <p class="card-text" [innerHtml]="safeHtml"></p>
    </div>
  </div>
</div>

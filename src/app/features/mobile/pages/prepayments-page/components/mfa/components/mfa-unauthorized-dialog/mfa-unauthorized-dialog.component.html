<app-bottom-sheet-panel [hasHeader]="false">
  <div bottomSheetPanelBody class="d-flex flex-column gap-4 p-0 mt-3">
    <div class="d-flex flex-column justify-content-center gap-3 px-4">
      <div class="d-flex align-items-center justify-content-center w-100">
        <img src="../../../../../../../../../assets/img/attention-icon.svg" alt="Attention">
      </div>
      <h2 class="m-0 text-center text-gray-700">Para continuar, você precisa ativar a autenticação de 2 fatores para
        maior segurança nas transações financeira.</h2>
    </div>
    <div class="p-4 bg-gray-200">
      <p class="m-0 fs-6">Você vai precisar usar seu e-mail e celular para ativar a autenticação.</p>
    </div>

    <div class="d-flex align-items-center justify-content-center gap-2 w-100 mb-4">
      <button type="button" class="btn btn-outline-primary px-3 py-2 fs-5" (click)="onCancelClick()">
        Fechar
      </button>
      <button type="button" class="btn btn-primary px-3 py-2 fs-5" (click)="onActivateClick()">
        Iniciar ativação
      </button>
    </div>
  </div>
</app-bottom-sheet-panel>

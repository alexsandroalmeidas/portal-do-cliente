<h1 mat-dialog-title>
  <div class="p-1-title">
    Antecipação Automática
  </div>
</h1>

<mat-dialog-content>

  <div *ngIf="viewMode === 'initial' ">
    <label>Escolha o período que deseja receber:</label>

    <div class="card mt-3" *ngFor="let schedule of schedules;">
      <div class="card-body d-flex flex-column align-items-center gap-2">
        <div class="container p-0">
          <div class="row pb-1">
            <div class="col-9 fs-5" align="start">
              <span class="fw-bolder">{{schedule.title}}</span>
            </div>
            <div class="col-3" align="end">
              <button type="button"
                      class="btn btn-primary btn-sm card-action"
                      (click)="onOpenContinue(schedule)">
                continuar
              </button>
            </div>
          </div>

          <mat-divider></mat-divider>

          <div class="row pt-1">
            <div class="col" align="start">
              <span class="info-label fs-13 ">{{schedule.description}}</span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div *ngIf="viewMode === 'weekly'">
    <label>Escolha até <b>2 (dois)</b> dias para receber:</label>

    <div class="card-days mt-3" *ngFor="let dayOfWeek of daysOfWeek;">
      <div class="card-body d-flex flex-column align-items-center gap-2">
        <div class="container">
          <div class="row mt-05">
            <div class="col-1">
              <input class="form-check-input fs-4"
                     type="checkbox"
                     (click)="$event.stopPropagation()"
                     (change)="$event ? selection.toggle(dayOfWeek) : null"
                     [checked]="selection.isSelected(dayOfWeek)"
                     [disabled]="selection.selected.length === 2 && !selection.isSelected(dayOfWeek)">
            </div>
            <div class="col-11 fs-5 day-of-week" align="start">
              <span class="fw-bolder">{{dayOfWeek.description}}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div *ngIf="viewMode === 'monthly'">
    <label>Escolha até <b>2 (dois)</b> dias para receber:</label>

    <mat-calendar #calendar
                  color="accent"
                  (selectedChange)="daySelected($event,calendar)"
                  [dateClass]="dateClass"
                  [minDate]="minDate"
                  [maxDate]="maxDate">
    </mat-calendar>
  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button"
          class="btn btn-outline-primary mr-05"
          (click)="onCancelClick()">
    Cancelar
  </button>

  <button *ngIf="viewMode !== 'initial'"
          type="button"
          class="btn btn-primary"
          [disabled]="verifyDisable"
          (click)="onContinueClick()">
    Continuar
  </button>
</mat-dialog-actions>

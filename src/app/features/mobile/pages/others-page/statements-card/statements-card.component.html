<div class="card mt-08" (click)="goToStatements()">
  <div class="card-body d-flex flex-column align-items-center gap-2">

    <div class="card-statements w-100 d-flex align-items-center justify-content-start gap-2">
      <div class="statements-icon d-flex align-items-center">
        <span class="material-symbols-outlined text-secondary">receipt</span>
      </div>

      <div class="statements-content d-flex justify-content-between align-items-center w-100">
        <div class="content-info d-flex flex-column justify-content-end gap-2 text-gray-900">

          <div class="container">
            <div class="row">
              <div class="col-7 pr-2">

                <div class="list">
                  <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                      <span class="info-label fs-14 word-break"><b>Extratos</b>
                      </span>
                    </li>
                    <li class="list-group-item">
                      <span class="info-label word-break">
                        Confira os extratos eletrônicos disponíveis
                      </span>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

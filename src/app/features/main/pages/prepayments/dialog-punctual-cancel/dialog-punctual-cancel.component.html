<h1 mat-dialog-title class="dialog-title">
  <mat-icon matSuffix class="icon-color">error</mat-icon> <br />

  <div class="p-1 fs-3">
    Antecipação Pontual cancelada!
  </div>
</h1>

<p class="p-1 attention">
  Atenção: Todo o processo foi cancelado e os valores
  disponíveis podem ser distintos.
</p>

<mat-dialog-actions align="end" class="float-end pt-1 pr-1">
  <button type="button" class="btn btn-outline-primary" (click)="onCloseClick()">
    Fechar
  </button>
</mat-dialog-actions>

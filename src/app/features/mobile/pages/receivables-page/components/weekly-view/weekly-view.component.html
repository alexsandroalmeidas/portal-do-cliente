<div class="weekly-view d-flex flex-wrap">
  <div
    class="card"
    *ngFor="let receivable of weeklyReceivables; let i = index"
    [ngClass]="{ 'mt-3': i === 0 || i === 1 }"
  >
    <div
      class="card-header d-flex justify-content-between align-items-center gap-2 bg-gray"
      [ngClass]="{
        'bg-secondary': receivable.date.isToday(),
        'text-white': !receivable.date.isToday(),
      }"
    >
      <span class="title">{{ receivable.date | referenceDay }}</span>
      <span class="date">{{ receivable.date | date: "dd/MM" }}</span>
    </div>
    <div class="card-body">
      <div
        class="card-content w-100 d-flex align-items-start justify-content-between gap-3"
      >
        <div
          class="content-info d-flex align-items-start justify-content-start gap-3"
        >
          <span
            class="material-symbols-outlined text-secondary"
            *ngIf="visibilityOn"
            >{{ getStatusIcon(receivable.status) }}</span
          >
          <div class="info-detail d-flex flex-column text-nowrap">
            <span
              class="fw-semibold text-uppercase"
              *ngIf="visibilityOn; else hidden_receivable_status"
            >
              {{ receivable.status }}
            </span>

            <ng-template #hidden_receivable_status>
              <span class="lh-1">{{
                receivable.status | hiddenValue: "&lowast;" : 5
              }}</span>
            </ng-template>

            <span class="text-end">
              <span class="info-label mr-2"><small>R$</small></span>
              <span
                class="text-end info-currency-qtd-1"
                *ngIf="visibilityOn; else hidden_receivable_amount"
              >
                {{ receivable.amount | number: "1.2-2" }}
              </span>

              <ng-template #hidden_receivable_amount>
                <span class="lh-1">{{
                  receivable.amount || 0 | hiddenValue: "&lowast;" : 5
                }}</span>
              </ng-template>
            </span>
          </div>
        </div>
      </div>
      <div class="card-actions card-icon d-flex align-items-center mt-2">
        <button
          type="button"
          class="btn btn-outline-secondary btn-sm card-action"
          (click)="goToReceivables(receivable.date)"
        >
          detalhes
        </button>
      </div>
    </div>
  </div>
</div>

<ng-container *ngIf="!hasSelectedEstablishments; else establishments_found">
  <app-establishments-not-found></app-establishments-not-found>
</ng-container>

<ng-template #establishments_found>

  <section class="heading">
    <div class="page-title">
      <h3>{{'app.communication.title'|translate}}</h3>
      <span class="page-subtitle">{{'app.communication.subtitle'|translate}}</span>
    </div>
  </section>

  <div class="content">

    <tabset [justified]="true">
      <tab heading="Banners">
        <app-banners-page></app-banners-page>
      </tab>
      <tab heading="Mensagens">
        <app-messages-page></app-messages-page>
      </tab>
    </tabset>

  </div>
</ng-template>

<ng-container *ngIf="!hasSelectedEstablishments; else establishments_found">
  <app-establishments-not-found></app-establishments-not-found>
</ng-container>

<ng-template #establishments_found>
  <section class="heading">
    <div class="page-title">
      <h3>{{ 'app.notifications.title' | translate }}</h3>
      <span class="page-subtitle">{{ 'app.notifications.subtitle' | translate }}</span>
    </div>

    <div class="page-actions">
      <section class="section-actions">
        <!-- <span class="px-2 fw-bolder">{{ 'app.message-navbar-title' | translate }} </span> -->
      </section>
    </div>
  </section>

  <app-banner-carousel
    [showIndicators]="true"
    [noWrap]="false"
    [slides]="slides"
    *ngIf="hasBannersPermission && !!slides.length"
  >
  </app-banner-carousel>

  <div class="content">
    <div class="row" *ngIf="!isView">
      <div class="col-12">
        <div class="card mt-3 card-establishments">
          <div class="card-body d-flex flex-column align-items-start gap-2">
            <span class="fw-bolder">Selecione um estabelecimento:</span>
            <div
              class="card-prepayment w-100 d-flex align-items-center justify-content-start gap-2"
            >
              <app-select-establishments
                class="w-50"
                [establishments]="establishmentsToSelect"
                [multiple]="false"
                [markFirst]="true"
                [selectedEstablishmentDocument]="establishmentsSelected"
                (selectedEstablishments)="onSelectedEstablishmentsClick($event)"
              >
              </app-select-establishments>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="card mt-3 card-list-notifications">
          <div class="card-body gap-2">
            <table mat-table [dataSource]="dataSource" multiTemplateDataRows matSort>
              <!-- Created Date Column -->
              <ng-container matColumnDef="createdDate">
                <th
                  mat-header-cell
                  *matHeaderCellDef
                  sortable="createdDate"
                  (sort)="onSort($event)"
                >
                  Tipo
                </th>
                <td
                  mat-cell
                  *matCellDef="let element"
                  class="{{ element.read ? '' : 'fw-bolder' }}"
                  (click)="onViewClick(element.id)"
                >
                  {{ element.createdDate | date : 'dd/MM/yyyy' }}
                </td>
              </ng-container>

              <!-- Title  Column -->
              <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef sortable="title" (sort)="onSort($event)">
                  Notificação
                </th>
                <td
                  mat-cell
                  *matCellDef="let element"
                  class="{{ element.read ? '' : 'fw-bolder' }}"
                  (click)="onViewClick(element.id)"
                >
                  {{ element.title || 0 }}
                </td>
              </ng-container>

              <ng-container cdkColumnDef="actions">
                <th cdk-header-cell *cdkHeaderCellDef>Opções</th>
                <td cdk-cell *cdkCellDef="let row">
                  <div class="d-flex justify-content-start">
                    <button
                      class="btn btn-sm d-flex align-items-center"
                      title="Excluir"
                      (click)="onDelete(row)"
                    >
                      <i class="material-icons">delete</i>
                    </button>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *cdkHeaderRowDef="columnsToDisplay"></tr>
              <tr
                mat-row
                *matRowDef="let element; columns: columnsToDisplay"
                class="element-row"
              ></tr>
            </table>

            <pagination
              class="pagination pagination-secondary d-flex justify-content-end"
              [totalItems]="filteredItems.length"
              [boundaryLinks]="true"
              [maxSize]="maxSize"
              [itemsPerPage]="itemsPerPage"
              [(ngModel)]="tablePage"
              previousText="&lsaquo;"
              nextText="&rsaquo;"
              firstText="&laquo;"
              lastText="&raquo;"
              (pageChanged)="onPaginate($event)"
            >
            </pagination>
          </div>
        </div>
      </div>
    </div>

    <div class="row" *ngIf="isView && !!notificationView">
      <app-notifications-view [notificationView]="notificationView"></app-notifications-view>
    </div>
  </div>
</ng-template>

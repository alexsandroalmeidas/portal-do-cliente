<div class="card mt-3">
  <div class="card-body d-flex flex-column align-items-center gap-2">

    <div class="card-sales w-100 d-flex align-items-center justify-content-start gap-2">

      <div class="sales-icon d-flex align-items-center">
        <span class="material-symbols-outlined text-secondary">credit_card</span>
      </div>

      <ul class="list-prep">
        <li>
          <div class="sales-content d-flex justify-content-between align-items-center w-100">
            <div class="content-info d-flex flex-column justify-content-end gap-2 text-gray-900 pr-05" (click)="filter.next()">
              <span class="info-label text-uppercase">Total de Vendas</span>
              <div class="info-text lh-1 d-flex align-items-end gap-2 fs-3">
                <span class="info-label"><small>R$</small></span>
                <span class="info-currency-qtd-1" *ngIf="visibilityOn; else hidden_sale_amount">
                  {{values.totalAmount | number:'1.2-2' }}</span>

                <ng-template #hidden_sale_amount>
                  <span class="lh-1">{{values.totalAmount | hiddenValue:'&lowast;':5 }}</span>
                </ng-template>
              </div>
            </div>

            <div class="card-actions card-icon d-flex align-items-center gap-2">
              <button type="button"
                      class="btn btn-primary btn-sm card-action"
                      (click)="filter.next()">
                {{PeriodFilterOptions['today']}}
              </button>

              <button type="button" class="btn-icon color-primary m-0 p-0 " (click)="refresh.next()">
                <span class="material-symbols-outlined update-icon">autorenew</span>
              </button>
            </div>
          </div>

        </li>
      </ul>
    </div>
  </div>
</div>

<div class="card" [class.hg-5]="!showRedirect">

  <div class="card-body d-flex flex-column align-items-center gap-2">

    <div class="card-prepayment w-100 d-flex align-items-center justify-content-start gap-2">

      <div class="{{available ? 'prepayment-icon' : 'prepayment-icon-2'}} d-flex align-items-center">
        <span class="material-symbols-outlined text-secondary">calendar_clock</span>
      </div>

      <ul class="list-prep" *ngIf="available">
        <li>
          <div class="prepayment-content d-flex justify-content-between align-items-center w-100">
            <div class="content-info d-flex flex-column justify-content-end gap-2 text-gray-900 pr-06">
              <span class="info-label text-uppercase">Disponível para Antecipar</span>
              <div class="info-text lh-1 d-flex align-items-end gap-2 fs-3">
                <span class="info-label"><small>R$</small></span>
                <span class="info-currency-qtd-1" *ngIf="visibilityOn; else hidden_total_amount">
                  {{totalAmount | number:'1.2-2' }}</span>

                <ng-template #hidden_total_amount>
                  <span class="lh-1">{{totalAmount | hiddenValue:'&lowast;':5 }}</span>
                </ng-template>
              </div>
            </div>

            <div class="card-actions card-icon d-flex align-items-center gap-2" *ngIf="showRedirect">
              <button type="button" class="btn btn-primary btn-sm card-action" (click)="filter.next()">
                Antecipe já!
              </button>
            </div>
          </div>

        </li>
      </ul>

      <ul class="list-prep" *ngIf="!available">
        <li>
          <span class="info-label fs-14 word-break text-uppercase" *ngIf="showTitle">
            Antecipação
          </span>
        </li>
        <li>
          <app-prepayments-unavailable-card></app-prepayments-unavailable-card>
        </li>
      </ul>

    </div>

    <div *ngIf="available && showRedirect"
         class="prepayment-content d-flex justify-content-between align-items-center w-100 prepayment-message">
      <span class="info-label word-break text-gray-600">
        <small>Os valores podem sofrer alterações no decorrer do dia.</small>
      </span>
    </div>

  </div>

  <ng-container *ngIf="useLoader">
    <home-loader [homeLoaderId]="'loader-home-prepayments'"></home-loader>
  </ng-container>
</div>

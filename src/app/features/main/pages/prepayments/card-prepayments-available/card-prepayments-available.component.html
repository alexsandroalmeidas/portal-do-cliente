<div class="card card-available">
  <div class="card-body d-flex flex-column align-items-center gap-2">

    <div *ngIf="prepaymentsAvailable"
         class="card-prepayment w-100 d-flex align-items-center justify-content-start gap-2">
      <div class="prepayment-icon prepayment-icon-available d-flex align-items-center">
        <span class="material-symbols-outlined text-primary fs-icon-available">calendar_clock</span>
      </div>

      <div class="prepayment-content d-flex justify-content-between align-items-center w-100">
        <div class="content-info d-flex flex-column justify-content-end gap-2 text-gray-900">

          <div class="container">
            <div class="row">
              <div class="col-7 pr-2">
                <span class="info-label text-primary fw-bolder">Disponível para antecipar</span>
              </div>
            </div>
            <div class="row">
              <div class="col-12 pr-2">
                <span class="info-label mr-2"><small>R$</small></span>
                <span class="info-currency-qtd-1 fs-14">
                  {{ totalAvailableAmountPrepayment || 0 | number:'1.2-2' }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <app-card-prepayments-unavailable *ngIf="!prepaymentsAvailable"></app-card-prepayments-unavailable>

  </div>
</div>
<div class="card card-prepayment-img">
  <div class="card-body d-flex flex-column align-items-center gap-2 p-0">

    <img class="logo w-100 img-available-hg" src="./../../assets/img/prepayments_banner.jpg" />
  </div>
</div>

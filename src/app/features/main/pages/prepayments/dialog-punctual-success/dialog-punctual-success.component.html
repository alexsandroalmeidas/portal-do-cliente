<div class="d-flex flex-column gap-4 p-0 mt-3">

  <div class="d-flex flex-column justify-content-center gap-3 px-4">
    <div class="d-flex align-items-center justify-content-center w-100">
      <img src="../../../../../../../../../assets/img/check-success.svg" alt="Attention">
    </div>
    <h2 class="m-0 text-center text-gray-700">
      Antecipação pontual realizada com sucesso.
    </h2>
  </div>
  <div class="p-4 bg-gray-200">
    <p class="m-0 fs-6">
      Você irá receber o valor antecipado em sua conta em até 1 dia útil. Acompanhe a transação na aba “Histórico de
      antecipações”
    </p>
  </div>

  <div class="d-flex align-items-center justify-content-center gap-2 w-100 mb-4">
    <button type="button" class="btn btn-outline-primary py-2" (click)="onCloseClick()">
      Fechar
    </button>
    <button type="button" class="btn btn-primary py-2" (click)="goActivate()">
      Realizar nova antecipação
    </button>
  </div>
</div>
